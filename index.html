<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/apple-icon-120.png" />
    <title>DynoPOS — bykor.co</title>
    <script>
      (function() {
        try {
          var store = JSON.parse(localStorage.getItem('dynopos-store'))
          if (!store || !store.state || store.state.isDarkMode !== false) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.jsx"></script>
  </body>
</html>
