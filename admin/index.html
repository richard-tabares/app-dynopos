<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin bykor.co — Próximamente</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f1f5f9;
    }
    .container { text-align: center; padding: 2rem; }
    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 0.5rem;
    }
    .logo span { color: #38bdf8; }
    .badge {
      display: inline-block;
      padding: 0.35rem 1rem;
      border-radius: 9999px;
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }
    h1 { font-size: 2rem; margin-bottom: 0.75rem; }
    p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2.5rem; }
    .dots { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; }
    .dot {
      width: 0.75rem; height: 0.75rem; border-radius: 50%;
      background: #38bdf8; animation: pulse 1.5s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
    .footer { font-size: 0.85rem; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">by<span>kor</span>.co</div>
    <div class="badge">Admin Panel</div>
    <h1>Próximamente</h1>
    <p>Estamos construyendo el panel de administración.</p>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="footer">bykor.co — Software de gestión</div>
  </div>
</body>
</html>
